---
layout: default
---
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<div class="container">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>

  {{ content }}

  <div id="map-stats" class="map-stats">
    <span id="stat-routes">— routes</span>
    <span class="map-stats__sep">·</span>
    <span id="stat-km">— km</span>
    <span class="map-stats__sep">·</span>
    <span id="stat-dates">—</span>
  </div>

  <div id="world-map"></div>
</div>

<script>
(function () {
  var map = L.map('world-map', {
    center: [30, 15],
    zoom: 3,
    zoomControl: true,
    scrollWheelZoom: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  var ROUTE_COLOR   = '#2d4739';
  var ROUTE_OPACITY = 0.8;
  var ROUTE_HOVER   = 1.0;

  function zoomWeight() {
    var z = map.getZoom();
    return z <= 4 ? 3 : z <= 8 ? 2.5 : 2;
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLon/2)*Math.sin(dLon/2);
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  var allLines = [];
  map.on('zoomend', function() {
    var w = zoomWeight();
    allLines.forEach(function(l) { l.setStyle({ weight: w }); });
  });

  fetch('{{ "/assets/data/world-routes.geojson" | relative_url }}')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var features = data.features;
      var totalKm = 0;
      var dates = [];

      features.forEach(function(feat) {
        var props = feat.properties;
        totalKm += props.distance_km;
        if (props.date && props.date !== 'unknown') dates.push(props.date);

        var raw = feat.geometry.coordinates.map(function(c){ return [c[1], c[0]]; });

        // Split segments on GPS jumps > 0.5 km
        var MAX_GAP_KM = 0.5;
        var segments = [], seg = [raw[0]];
        for (var i = 1; i < raw.length; i++) {
          var d = haversineKm(raw[i-1][0], raw[i-1][1], raw[i][0], raw[i][1]);
          if (d > MAX_GAP_KM) { if (seg.length > 1) segments.push(seg); seg = []; }
          seg.push(raw[i]);
        }
        if (seg.length > 1) segments.push(seg);

        var label = (props.activity || 'route') + ' · ' + props.date + ' · ' + props.distance_km + ' km';
        segments.forEach(function(coords) {
          var line = L.polyline(coords, {
            color: ROUTE_COLOR, weight: zoomWeight(), opacity: ROUTE_OPACITY, smoothFactor: 2,
          }).addTo(map);
          allLines.push(line);
          line.bindTooltip(label, { sticky: true, className: 'map-tooltip' });
          line.on('mouseover', function() { this.setStyle({ opacity: ROUTE_HOVER, weight: zoomWeight() + 1.5 }); this.bringToFront(); });
          line.on('mouseout',  function() { this.setStyle({ opacity: ROUTE_OPACITY, weight: zoomWeight() }); });
        });
      });

      document.getElementById('stat-routes').textContent = features.length + ' routes';
      document.getElementById('stat-km').textContent     = Math.round(totalKm) + ' km';
      if (dates.length) {
        dates.sort();
        document.getElementById('stat-dates').textContent =
          dates[0] === dates[dates.length-1] ? dates[0] : dates[0] + ' – ' + dates[dates.length-1];
      }
    })
    .catch(function(err){ console.error('Failed to load routes:', err); });
})();
</script>

---
layout: default
---
<div class="container">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
  </header>
  <ul class="post-list">
    {% for post in site.posts %}
    <li class="post-list__item">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
    </li>
    {% endfor %}
  </ul>
</div>

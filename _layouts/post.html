---
layout: default
---
<div class="container">
  <article>
    <header class="post-header">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% for cat in page.categories %}
        <span class="post-category">{{ cat }}</span>
        {% endfor %}
      </div>
    </header>
    <div class="post-body">
      {{ content }}
    </div>
  </article>
</div>

# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Chris Kremer
email: christian.kremer@whu.edu
description: >-
  Economics, technology, and data ethics.
baseurl: ""
url: ""
github_username: chris-kremer

# Navigation
header_pages:
  - about.markdown
  - writing/index.md
  - media/index.md
  - projects/index.md

# Collections — one per media type + people for cross-linking
collections:
  books:
    output: true
    permalink: /media/books/:slug/
  papers:
    output: true
    permalink: /media/papers/:slug/
  movies:
    output: true
    permalink: /media/movies/:slug/
  podcasts:
    output: true
    permalink: /media/podcasts/:slug/
  lectures:
    output: true
    permalink: /media/lectures/:slug/
  people:
    output: true
    permalink: /people/:slug/

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Keep the public build focused on site content. Jekyll copies any
# unrecognized top-level files and directories by default, so raw imports,
# local apps, and generated artifacts need to be excluded explicitly.
exclude:
  - .claude/
  - .github/
  - .jekyll-cache/
  - .sass-cache/
  - __pycache__/
  - _site/
  - admin/
  - ai_project/
  - behavior-bench/
  - gpx/
  - Notion/
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - admin.py
  - convert_gpx.py
  - convert_routes.py
  - import_goodreads.py
  - import_notion.py
  - import_people.py
  - ols_minimal.R
  - prepare_bench_data.py
  - render.yaml
  - node_modules/
  - vendor/
